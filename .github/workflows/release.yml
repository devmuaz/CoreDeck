name: Release (Windows, Linux, and Mac)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: coredeck-linux
            asset_name: coredeck-linux.tar.gz
          - os: windows-latest
            artifact_name: coredeck-windows
            asset_name: coredeck-windows.zip
          - os: macos-latest
            artifact_name: coredeck-macos
            asset_name: coredeck-macos.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check built-in CMake version
        run: cmake --version

      - name: Set up CMake (if needed)
        if: matrix.os != 'windows-latest'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.23.0'

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release/${{ matrix.artifact_name }}
          cp build/CoreDeck release/${{ matrix.artifact_name }}/
          cp -r build/assets release/${{ matrix.artifact_name }}/
          cp README.md release/${{ matrix.artifact_name }}/
          cd release
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Setup Apple Developer Signing (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Create keychain
          security create-keychain -p "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" build.keychain

          # Import certificate
          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" build.keychain

          # Find the certificate identity
          echo "CERTIFICATE_NAME=$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_ENV

      - name: Package and Sign (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p release/${{ matrix.artifact_name }}
          cp -r build/CoreDeck.app release/${{ matrix.artifact_name }}/
          cp README.md release/${{ matrix.artifact_name }}/

          # Professional code signing for ARM64 binary
          codesign --force --options runtime --deep --sign "$CERTIFICATE_NAME" release/${{ matrix.artifact_name }}/CoreDeck.app

          # Create DMG for better distribution
          mkdir dmg_temp
          cp -r release/${{ matrix.artifact_name }}/CoreDeck.app dmg_temp/
          cp README.md dmg_temp/
          hdiutil create -size 100m -format UDZO -srcfolder dmg_temp -volname "CoreDeck" release/CoreDeck-${{ steps.version.outputs.version || 'latest' }}.dmg

          # Sign the DMG too
          codesign --force --sign "$CERTIFICATE_NAME" release/CoreDeck-${{ steps.version.outputs.version || 'latest' }}.dmg

          # Notarize (submit for Apple approval)
          xcrun notarytool submit release/CoreDeck-${{ steps.version.outputs.version || 'latest' }}.dmg \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait

          # Staple notarization
          xcrun stapler staple release/CoreDeck-${{ steps.version.outputs.version || 'latest' }}.dmg

          cd release
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release\${{ matrix.artifact_name }}
          copy build\Release\CoreDeck.exe release\${{ matrix.artifact_name }}\
          xcopy /E build\assets release\${{ matrix.artifact_name }}\assets\
          copy README.md release\${{ matrix.artifact_name }}\
          cd release
          powershell Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ${{ matrix.asset_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.asset_name }}

  create-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: CoreDeck ${{ steps.version.outputs.version }}
          body: |
            ## CoreDeck ${{ steps.version.outputs.version }}
            
            Download the appropriate version for your platform:
            
            - **Windows**: `coredeck-windows.zip`
            - **macOS**: `coredeck-macos.tar.gz`
            - **Linux**: `coredeck-linux.tar.gz`
            
            ### Installation
            1. Download the archive for your platform
            2. Extract the archive
            3. Run the `CoreDeck` executable
            
            🤖 *This release was automatically generated by GitHub Actions*
          files: |
            artifacts/coredeck-windows/coredeck-windows.zip
            artifacts/coredeck-macos/coredeck-macos.tar.gz
            artifacts/coredeck-linux/coredeck-linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}