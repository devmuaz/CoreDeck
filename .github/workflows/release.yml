name: Release (Windows, Linux, and Mac)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: coredeck-linux-x86-64
            asset_name: coredeck-linux-x86-64.tar.gz
          - os: ubuntu-24.04-arm
            artifact_name: coredeck-linux-arm64
            asset_name: coredeck-linux-arm64.tar.gz
          - os: windows-latest
            artifact_name: coredeck-windows-x86-64
            asset_name: coredeck-windows-x86-64
          - os: macos-latest
            artifact_name: coredeck-darwin-arm64
            asset_name: coredeck-darwin-arm64.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up CMake
        if: matrix.os != 'windows-latest'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.23.0'

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package artifacts (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          mkdir -p release/${{ matrix.artifact_name }}
          cp build/CoreDeck release/${{ matrix.artifact_name }}/
          cp -r build/assets release/${{ matrix.artifact_name }}/
          cp README.md release/${{ matrix.artifact_name }}/
          cd release
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Setup Apple Developer Signing (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        run: |
          security create-keychain -p "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" build.keychain
          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" build.keychain
          echo "CERTIFICATE_NAME=$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_ENV

      - name: Package and Sign (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p release/${{ matrix.artifact_name }}
          cp -r build/CoreDeck.app release/${{ matrix.artifact_name }}/
          cp README.md release/${{ matrix.artifact_name }}/
          codesign --force --options runtime --deep --sign "$CERTIFICATE_NAME" release/${{ matrix.artifact_name }}/CoreDeck.app
          cd release/${{ matrix.artifact_name }}
          zip -r ../CoreDeck-notarize.zip CoreDeck.app
          cd ../..
          xcrun notarytool submit release/CoreDeck-notarize.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple release/${{ matrix.artifact_name }}/CoreDeck.app
          cd release
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install wixtoolset

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          cd build
          cpack -G ZIP
          cpack -G WIX
          mkdir ..\release
          for %%i in (*.msi) do copy "%%i" "..\release\coredeck-windows-x86-64.msi"
          for %%i in (*.zip) do copy "%%i" "..\release\coredeck-windows-x86-64.zip"

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/coredeck-windows-x86-64.msi
            release/coredeck-windows-x86-64.zip

      - name: Upload artifacts (Linux and macOS)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.asset_name }}

  create-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: CoreDeck ${{ steps.version.outputs.version }}
          body: |
            ## CoreDeck ${{ steps.version.outputs.version }}

            Download the appropriate version for your platform:

            **Windows (x86-64):**
            - `coredeck-windows-x86-64.msi` - Professional installer (recommended)
            - `coredeck-windows-x86-64.zip` - Portable version

            **macOS (Apple Silicon):** `coredeck-darwin-arm64.tar.gz`

            **Linux (x86-64):** `coredeck-linux-x86-64.tar.gz`

            **Linux (ARM64):** `coredeck-linux-arm64.tar.gz`

            ### Installation
            **Windows:** Double-click the MSI to install, or extract the ZIP and run CoreDeck.exe directly.

            **macOS/Linux:** Extract the archive and run the `CoreDeck` executable.

            ### Troubleshooting (macOS)
            If the app won't open, remove the quarantine attribute:
            ```bash
            xattr -cr CoreDeck.app
            ```
          files: |
            artifacts/coredeck-windows-x86-64/coredeck-windows-x86-64.msi
            artifacts/coredeck-windows-x86-64/coredeck-windows-x86-64.zip
            artifacts/coredeck-darwin-arm64/coredeck-darwin-arm64.tar.gz
            artifacts/coredeck-linux-x86-64/coredeck-linux-x86-64.tar.gz
            artifacts/coredeck-linux-arm64/coredeck-linux-arm64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}